<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${pageTitle != null ? pageTitle + ' - Searchable' : 'Searchable Admin'}">
    Searchable Admin
  </title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body>
<footer th:fragment="footer"
        class="footer mt-auto py-3 border-top text-center text-muted small">
  <span>Searchable Admin UI &middot; 1.0.0</span>
</footer>

<th:block th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/app.js}"></script>
</th:block>
</body>
</html>
