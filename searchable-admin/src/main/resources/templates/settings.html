<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head('Settings')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container-fluid py-4">
  <h1 class="h3 mb-4">Global Settings</h1>

  <div th:if="${flashSuccess}" class="alert alert-success" th:text="${flashSuccess}"></div>

  <p class="text-muted">
    新規に作成される Namespace の既定値を設定します。既存 Namespace の
    設定は変更されません。
  </p>

  <!-- TASK-105: storage paths / persistence (read-only) -->
  <section class="card mb-4">
    <div class="card-header">Storage paths</div>
    <div class="card-body">
      <dl class="row mb-0">
        <dt class="col-sm-4">Data directory</dt>
        <dd class="col-sm-8"><code th:text="${dataDirectory}"></code></dd>
        <dt class="col-sm-4">Index directory</dt>
        <dd class="col-sm-8"><code th:text="${indexDirectory}"></code></dd>
        <dt class="col-sm-4">Metadata DB</dt>
        <dd class="col-sm-8">
          <code th:text="${persistence.type}"></code>
          <span th:text="${persistence.url}"></span>
        </dd>
      </dl>
      <p class="form-text">
        パスはアプリケーション起動時に固定されます。変更後は再起動が必要です。
      </p>
    </div>
  </section>

  <form method="post" th:action="@{/settings}" th:object="${form}" novalidate>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label" for="defaultArchitecture">Default Architecture</label>
        <select id="defaultArchitecture" class="form-select"
                th:field="*{defaultArchitecture}">
          <option th:each="t : ${architectures}" th:value="${t}" th:text="${t}"></option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label" for="defaultSearchStrategy">Default Search Strategy</label>
        <select id="defaultSearchStrategy" class="form-select"
                th:field="*{defaultSearchStrategy}">
          <option th:each="s : ${strategies}" th:value="${s}" th:text="${s}"></option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label" for="defaultSearchOrder">Default Search Order</label>
        <select id="defaultSearchOrder" class="form-select"
                th:field="*{defaultSearchOrder}">
          <option th:each="o : ${orders}" th:value="${o}" th:text="${o}"></option>
        </select>
      </div>
    </div>

    <div class="mt-4">
      <button type="submit" class="btn btn-primary">Save</button>
      <a class="btn btn-outline-secondary" th:href="@{/}">Cancel</a>
    </div>
  </form>
</main>

<footer th:replace="~{layouts/base :: footer}"></footer>
<th:block th:replace="~{layouts/base :: scripts}"></th:block>
</body>
</html>
