<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head('Backup settings')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container-fluid py-4">
  <h1 class="h3 mb-4">Backup settings</h1>

  <div th:if="${flashSuccess}" class="alert alert-success" th:text="${flashSuccess}"></div>
  <div th:if="${flashError}" class="alert alert-danger" th:text="${flashError}"></div>

  <section class="card mb-4">
    <div class="card-header">既定バックアップ先</div>
    <div class="card-body">
      <p>Lucene インデックスのスナップショットは以下に書き出されます。</p>
      <p><code th:text="${rootDirectory}"></code></p>
      <p class="form-text">
        スケジュール実行は <code>BackupScheduler</code> をアプリケーション起動時に
        登録してください(<a th:href="@{/docs/architecture.md}">アーキテクチャ</a>を参照)。
      </p>
    </div>
  </section>

  <form method="post" th:action="@{/settings/backup/run}">
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label" for="directory">書き出し先ディレクトリ (省略時は既定)</label>
        <input id="directory" name="directory" class="form-control"
               th:placeholder="${rootDirectory}"/>
      </div>
    </div>
    <div class="mt-3">
      <button type="submit" class="btn btn-warning">今すぐスナップショット</button>
    </div>
  </form>
</main>

<footer th:replace="~{layouts/base :: footer}"></footer>
<th:block th:replace="~{layouts/base :: scripts}"></th:block>
</body>
</html>
