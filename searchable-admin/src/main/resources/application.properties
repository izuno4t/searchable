spring.application.name=searchable-admin

server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# File upload limits
spring.servlet.multipart.max-file-size=64MB
spring.servlet.multipart.max-request-size=128MB

# Searchable defaults (inherits from searchable-api)
searchable.data-directory=./data
searchable.persistence.type=H2
searchable.persistence.url=jdbc:h2:./data/metadata;MODE=PostgreSQL
searchable.persistence.username=sa
searchable.persistence.password=
searchable.index.directory=./data/indexes
searchable.global.default-architecture=FULL_TEXT
searchable.global.default-search-strategy=SEQUENTIAL

# AI summarisation (TASK-006). Disabled by default; set enabled=true and pick a
# provider to activate. API keys are NOT bound here — each provider reads its
# own environment variable (OPENAI_API_KEY / ANTHROPIC_API_KEY) so secrets stay
# out of properties files.
searchable.ai.enabled=false
searchable.ai.provider=
searchable.ai.model=
searchable.ai.timeout=15s
searchable.ai.max-tokens=512
searchable.ai.temperature=0.2
searchable.ai.max-context-items=5
searchable.ai.max-context-chars=8000
searchable.ai.fallback-on-error=true
