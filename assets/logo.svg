<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
     stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Searchable">
  <title>Searchable</title>
  <!-- Magnifying-glass lens -->
  <circle cx="27" cy="27" r="21" stroke-width="5"/>
  <!-- Short handle (~1/3 of the lens diameter) -->
  <line x1="44" y1="44" x2="54" y2="54" stroke-width="6"/>
  <!-- Passage under the lens: three lines of body copy, with the
       trailing fragment on the last line broken off. -->
  <g stroke-width="4">
    <line x1="15" y1="20" x2="39" y2="20"/>
    <line x1="15" y1="27" x2="39" y2="27"/>
    <line x1="15" y1="34" x2="32" y2="34"/>
    <line x1="36" y1="34" x2="39" y2="34"/>
  </g>
</svg>
