<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     role="img" aria-label="Searchable">
  <title>Searchable</title>
  <!-- Lens and short handle: 紺 / Japan navy -->
  <circle cx="27" cy="27" r="21" stroke="#1B365D" stroke-width="5"/>
  <line x1="44" y1="44" x2="54" y2="54" stroke="#1B365D" stroke-width="6"/>
  <!-- Body copy in navy -->
  <g stroke="#1B365D" stroke-width="4">
    <line x1="15" y1="20" x2="39" y2="20"/>
    <line x1="15" y1="27" x2="39" y2="27"/>
    <line x1="15" y1="34" x2="32" y2="34"/>
  </g>
  <!-- Trailing fragment in 朱 (vermilion) — the matched hit. -->
  <line x1="36" y1="34" x2="39" y2="34" stroke="#D4252A" stroke-width="4"/>
</svg>
