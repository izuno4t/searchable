name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  MAVEN_OPTS: "-Xmx2g -Dfile.encoding=UTF-8"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress --errors --fail-at-end -Dstyle.color=always"

jobs:
  build-and-test:
    name: Build + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and run unit tests
        run: mvn $MAVEN_CLI_OPTS -DskipITs verify

      - name: Upload JaCoCo HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            **/target/site/jacoco/
            **/target/jacoco.exec

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"

  integration-test:
    name: Integration Tests (H2 + Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run full test suite (includes Testcontainers paths)
        run: mvn $MAVEN_CLI_OPTS verify

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-surefire-reports
          path: "**/target/surefire-reports/"

  static-analysis:
    name: Static Analysis (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run quality profile
        run: mvn $MAVEN_CLI_OPTS -Pquality -DskipTests verify

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: "**/target/spotbugs*.xml"

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dc-nvd-${{ runner.os }}-v1

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -n "$NVD_API_KEY" ]; then
            mvn $MAVEN_CLI_OPTS -Psecurity -DskipTests \
              -DnvdApiKey="$NVD_API_KEY" verify
          else
            mvn $MAVEN_CLI_OPTS -Psecurity -DskipTests verify
          fi

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: "**/target/dependency-check-report.*"

  docs-lint:
    name: Docs Lint (markdownlint + Spectral + cspell)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#**/target/**"

      - name: Run cspell
        run: |
          npx --yes cspell --no-progress --no-summary \
            "**/*.{md,java,xml,yml,yaml,json,properties}" \
            --exclude "node_modules/**" --exclude "**/target/**"

      - name: Lint OpenAPI spec
        run: |
          if [ -f searchable-api/src/main/resources/openapi.yaml ]; then
            npx --yes @stoplight/spectral-cli lint \
              searchable-api/src/main/resources/openapi.yaml \
              --ruleset .spectral.yaml
          else
            echo "OpenAPI spec not present; skipping Spectral."
          fi

  coverage-aggregate:
    name: Aggregate Coverage Report
    runs-on: ubuntu-latest
    needs: [build-and-test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Generate aggregate coverage
        run: mvn $MAVEN_CLI_OPTS -Pcoverage-aggregate verify

      - name: Upload aggregate JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-aggregate-report
          path: target/site/jacoco-aggregate/
