name: CI

# 大規模リファクタ中のため自動実行を停止。必要時のみ手動実行。
# リファクタ完了後に push / pull_request トリガーを復元すること。
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - ".cspell/**"
  #     - ".github/workflows/ci.yml"
  #     - ".markdownlint*"
  #     - ".mvn/**"
  #     - ".spectral.yaml"
  #     - "*.md"
  #     - "config/**"
  #     - "docs/**"
  #     - "mvnw"
  #     - "mvnw.cmd"
  #     - "pom.xml"
  #     - "searchable-*/pom.xml"
  #     - "searchable-*/src/**"
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - ".cspell/**"
  #     - ".github/workflows/ci.yml"
  #     - ".markdownlint*"
  #     - ".mvn/**"
  #     - ".spectral.yaml"
  #     - "*.md"
  #     - "config/**"
  #     - "docs/**"
  #     - "mvnw"
  #     - "mvnw.cmd"
  #     - "pom.xml"
  #     - "searchable-*/pom.xml"
  #     - "searchable-*/src/**"

permissions:
  contents: read

env:
  MAVEN_OPTS: "-Xmx2g -Dfile.encoding=UTF-8"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress --errors --fail-at-end -Dstyle.color=always"

jobs:
  build-and-test:
    name: Build + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and run unit tests
        run: ./mvnw $MAVEN_CLI_OPTS -DskipITs verify

      - name: Upload JaCoCo HTML reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-reports
          path: |
            **/target/site/jacoco/
            **/target/jacoco.exec

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"

  integration-test:
    name: Integration Tests (H2 + Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run full test suite (includes Testcontainers paths)
        run: ./mvnw $MAVEN_CLI_OPTS verify

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-surefire-reports
          path: "**/target/surefire-reports/"

  static-analysis:
    name: Static Analysis (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run quality profile
        run: ./mvnw $MAVEN_CLI_OPTS -Pquality -DskipTests verify

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-reports
          path: "**/target/spotbugs*.xml"

  docs-lint:
    name: Docs Lint (markdownlint + Spectral + cspell)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#**/target/**"

      - name: Run cspell
        run: |
          npx --yes cspell --no-progress --no-summary \
            "**/*.{md,java,xml,yml,yaml,json,properties}" \
            --exclude "node_modules/**" --exclude "**/target/**"

      - name: Lint OpenAPI spec
        run: |
          if [ -f examples/api/openapi.yaml ]; then
            npx --yes @stoplight/spectral-cli lint \
              examples/api/openapi.yaml \
              --ruleset .spectral.yaml
          else
            echo "OpenAPI spec not present; skipping Spectral."
          fi

  coverage-aggregate:
    name: Aggregate Coverage Report
    runs-on: ubuntu-latest
    needs: [build-and-test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Generate aggregate coverage
        run: ./mvnw $MAVEN_CLI_OPTS -Pcoverage-aggregate verify

      - name: Upload aggregate JaCoCo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-aggregate-report
          path: target/site/jacoco-aggregate/
