name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".cspell/**"
      - ".github/workflows/ci.yml"
      - ".markdownlint*"
      - ".mvn/**"
      - ".spectral.yaml"
      - "*.md"
      - "config/**"
      - "docs/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "searchable-*/pom.xml"
      - "searchable-*/src/**"
  pull_request:
    branches: [main]
    paths:
      - ".cspell/**"
      - ".github/workflows/ci.yml"
      - ".markdownlint*"
      - ".mvn/**"
      - ".spectral.yaml"
      - "*.md"
      - "config/**"
      - "docs/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "searchable-*/pom.xml"
      - "searchable-*/src/**"

permissions:
  contents: read

env:
  MAVEN_OPTS: "-Xmx2g -Dfile.encoding=UTF-8"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress --errors --fail-at-end -Dstyle.color=always"

jobs:
  build-and-test:
    name: Build + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and run unit tests
        run: ./mvnw $MAVEN_CLI_OPTS -DskipITs verify

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"

  integration-test:
    name: Integration Tests (H2 + Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run full test suite + aggregate coverage
        run: ./mvnw $MAVEN_CLI_OPTS -Pcoverage-aggregate verify

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-surefire-reports
          path: "**/target/surefire-reports/"

      - name: Upload coverage to Codecov
        # Only on main pushes (push from main or workflow_dispatch from main).
        # PRs and non-main branches do not upload.
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./target/site/jacoco-aggregate/jacoco.xml
          fail_ci_if_error: false

  static-analysis:
    name: Static Analysis (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run quality profile
        run: ./mvnw $MAVEN_CLI_OPTS -Pquality -DskipTests verify

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-reports
          path: "**/target/spotbugs*.xml"

  javadoc:
    # Catches Javadoc generation failures (e.g. module resolution errors
    # against the project sources) as part of every-push feedback, so
    # they never surface only at release time. Runs the release profile
    # because that is where the Javadoc execution is bound, with GPG
    # signing and deploy disabled.
    name: Javadoc Generation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Generate Javadoc (release profile, no signing, no deploy)
        run: ./mvnw $MAVEN_CLI_OPTS -Prelease -DskipTests -Dgpg.skip=true verify

  docs-lint:
    name: Docs Lint (markdownlint + Spectral + cspell)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#**/target/**"

      - name: Run cspell
        run: |
          npx --yes cspell --no-progress --no-summary \
            "**/*.{md,java,xml,yml,yaml,json,properties}" \
            --exclude "node_modules/**" --exclude "**/target/**"

      - name: Lint OpenAPI spec
        run: |
          if [ -f examples/api/openapi.yaml ]; then
            npx --yes @stoplight/spectral-cli lint \
              examples/api/openapi.yaml \
              --ruleset .spectral.yaml
          else
            echo "OpenAPI spec not present; skipping Spectral."
          fi

