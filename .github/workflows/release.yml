name: Publish

# Publishes artifacts to Sonatype Central Portal on every push to main.
# The pom's <version> is the source of truth:
#   *-SNAPSHOT  → published to the Central snapshot repository
#   otherwise   → published to Maven Central as a release (signed)
# central-publishing-maven-plugin auto-routes based on the suffix, so a
# single workflow covers both modes.
#
# To cut a release: bump every pom.xml from X.Y.Z-SNAPSHOT to X.Y.Z,
# commit, and push to main. Bump back to the next SNAPSHOT afterwards.
#
# Required GitHub Secrets:
#   - CENTRAL_USERNAME  : Central Portal token user (https://central.sonatype.com/account)
#   - CENTRAL_TOKEN     : Central Portal token password
#   - GPG_PRIVATE_KEY   : ASCII-armored GPG private key
#   - GPG_PASSPHRASE    : Passphrase for the GPG key
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  MAVEN_OPTS: "-Xmx2g -Dfile.encoding=UTF-8"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress --errors -Dstyle.color=always"

jobs:
  publish:
    name: Publish to Sonatype Central
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21 + Central Portal credentials + GPG key
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Detect pom version
        id: version
        run: |
          POM_VERSION=$(grep -m1 -oP '(?<=<version>)[^<]+' pom.xml)
          echo "Pom version: $POM_VERSION"
          # Reject anything that is not a strict semver-style version
          # (with optional -SNAPSHOT or other qualifier).
          if ! [[ "$POM_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid pom version: $POM_VERSION"
            exit 1
          fi
          echo "version=$POM_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$POM_VERSION" == *-SNAPSHOT ]]; then
            echo "kind=snapshot" >> "$GITHUB_OUTPUT"
          else
            echo "kind=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy ${{ steps.version.outputs.kind }} (${{ steps.version.outputs.version }})
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./mvnw $MAVEN_CLI_OPTS -Prelease -DskipTests deploy
