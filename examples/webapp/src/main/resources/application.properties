spring.application.name=searchable-webapp
server.port=8080

# Searchable core configuration (override via env vars or extra properties).
searchable.data-directory=./data/webapp
searchable.persistence.url=jdbc:h2:./data/webapp/metadata;MODE=PostgreSQL
searchable.ingest.enabled=false
searchable.ingest.namespace=default
searchable.ingest.source=./data/sample

logging.level.root=INFO
logging.level.io.searchable=INFO
