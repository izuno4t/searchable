# Example: searchable-admin AI summarisation via a local Ollama server.
#
# This file shows only the searchable.ai.* block that differs from the
# admin defaults (see searchable-admin/src/main/resources/application.properties).
# Either merge these lines into your existing application.properties, or
# drop this file in as a Spring profile (rename to
# application-ai-ollama.properties, then start with
# --spring.profiles.active=ai-ollama).

# Master switch. Defaults to false; must be true for the summarize action
# to call any provider.
searchable.ai.enabled=true

# Provider id resolved via ServiceLoader. "ollama" matches
# io.searchable.ai.ollama.OllamaProvider#name().
searchable.ai.provider=ollama

# Model identifier sent to Ollama. Empty falls through to
# OLLAMA_DEFAULT_MODEL / "llama3.2". Must be a model already pulled into
# the Ollama server (run `ollama pull <name>`).
searchable.ai.model=llama3.2

# Wall-clock timeout per call. Local models on modest hardware can take
# longer than the 15s admin default, so raise to 30s here.
searchable.ai.timeout=30s

# Maps to Ollama options.num_predict (token cap for the response).
searchable.ai.max-tokens=512

# Maps to Ollama options.temperature.
searchable.ai.temperature=0.2

# Caps on the indexed-document context handed to the LLM. Defaults are
# usually fine; raise only if responses are missing relevant context.
searchable.ai.max-context-items=5
searchable.ai.max-context-chars=8000

# When the provider raises TIMEOUT / UPSTREAM, return an empty summary
# (model="ai-fallback") rather than propagating the exception. AUTH and
# REQUEST always rethrow regardless.
searchable.ai.fallback-on-error=true

# --- Ollama-specific endpoint / default model ---
#
# OllamaProvider does NOT read these from Spring properties. Override
# them via environment variables or JVM system properties instead:
#
#   OLLAMA_BASE_URL=http://ollama.internal:11434
#   OLLAMA_DEFAULT_MODEL=qwen2.5
#
#   -Dsearchable.ai.ollama.base-url=http://ollama.internal:11434
#   -Dsearchable.ai.ollama.default-model=qwen2.5
#
# Defaults are http://localhost:11434 and llama3.2.
