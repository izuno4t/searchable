<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Searchable UI</title>
    <link rel="stylesheet" href="src/css/styles.css"/>
</head>
<body>
<header>
    <h1>Searchable</h1>
    <p class="muted">Sample UI client for the REST API</p>
</header>

<main>
    <form id="search-form" autocomplete="off">
        <input id="search-input" type="search" name="q"
               placeholder="Enter a query (e.g. full-text search)" autofocus required/>
        <button type="submit">🔍 Search</button>
    </form>

    <section class="layout">
        <aside id="facets" hidden>
            <h2>Filters</h2>
            <div id="facet-list"></div>
            <button id="facet-clear" type="button">Clear</button>
        </aside>

        <section id="results">
            <div id="status" class="muted" role="status" aria-live="polite"></div>
            <ol id="hits"></ol>
            <nav id="pagination" hidden></nav>
        </section>
    </section>
</main>

<footer>
    <p class="muted">
        API endpoint: <code id="api-endpoint">/api/v1/search</code>
        <button id="config-btn" type="button">Change</button>
    </p>
</footer>

<script src="src/js/api.js"></script>
<script src="src/js/main.js"></script>
</body>
</html>
