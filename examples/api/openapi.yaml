openapi: 3.1.0
info:
  title: Searchable REST API
  version: 1.1.0
  description: |
    REST API for Searchable, a Japanese-optimized hybrid search library.

    The `searchType` field on `POST /api/v1/search` selects the engine:

    * `FULL_TEXT` — Apache Lucene + Kuromoji morphological analysis (BM25)
    * `VECTOR` — Lucene HNSW kNN search over embeddings
    * `HYBRID` — combination, controlled per-namespace by `searchStrategy`
      (`SEQUENTIAL` — intersection of both engines re-ranked by the
      secondary engine; `PARALLEL` — Reciprocal Rank Fusion)

    When `searchType` is omitted, the namespace's configured
    `architecture` is used.
  contact:
    name: NRI Netcom Corporation
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: namespaces
    description: Namespace lifecycle and configuration
  - name: index
    description: Document indexing operations
  - name: search
    description: Search execution
  - name: dictionaries
    description: Kuromoji user dictionaries (global + namespace-scoped)
paths:
  /api/v1/namespaces:
    get:
      tags: [namespaces]
      summary: List all namespaces
      description: Return every namespace registered in the system.
      operationId: listNamespaces
      responses:
        '200':
          description: Namespace list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceListResponse'
    post:
      tags: [namespaces]
      summary: Create a namespace
      description: Create a namespace and initialize its index metadata.
      operationId: createNamespace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamespaceCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/namespaces/{id}:
    get:
      tags: [namespaces]
      summary: Get a namespace by id
      description: Return the namespace configuration and timestamps for one id.
      operationId: getNamespace
      parameters:
        - $ref: '#/components/parameters/NamespaceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [namespaces]
      summary: Update a namespace (name and/or config)
      description: Update the namespace name, configuration, or both.
      operationId: updateNamespace
      parameters:
        - $ref: '#/components/parameters/NamespaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamespaceUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [namespaces]
      summary: Delete a namespace and its index
      description: Delete the namespace record and associated index data.
      operationId: deleteNamespace
      parameters:
        - $ref: '#/components/parameters/NamespaceId'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/namespaces/{id}/config:
    put:
      tags: [namespaces]
      summary: Update only the namespace configuration
      description: Replace only the namespace search configuration.
      operationId: updateNamespaceConfig
      parameters:
        - $ref: '#/components/parameters/NamespaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamespaceConfigDto'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/search:
    post:
      tags: [search]
      summary: Execute a search
      description: Execute full-text, vector, or hybrid search across namespaces.
      operationId: searchDocuments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/index/documents:
    post:
      tags: [index]
      summary: Index a single document
      description: Add or replace one document in the target namespace index.
      operationId: indexDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexRequest'
      responses:
        '201':
          description: Indexed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexedResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/index/documents/{documentId}:
    delete:
      tags: [index]
      summary: Delete a document
      description: Delete one indexed document from a namespace.
      operationId: deleteDocument
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - name: namespaceId
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/index/batch:
    post:
      tags: [index]
      summary: Index multiple documents
      description: Add or replace multiple documents in one namespace index.
      operationId: indexBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchIndexRequest'
      responses:
        '200':
          description: Batch result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIndexResponse'
  /api/v1/index/rebuild:
    post:
      tags: [index]
      summary: Rebuild a namespace index
      description: Clear and rebuild the index for one namespace.
      operationId: rebuildIndex
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [namespaceId]
              properties:
                namespaceId:
                  type: string
      responses:
        '200':
          description: Rebuild scheduled / completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  namespaceId: { type: string }
                  status: { type: string, example: REBUILT }
  /api/v1/index/{namespaceId}/metadata:
    get:
      tags: [index]
      summary: Get index metadata
      description: Return document count, status, and size metadata for an index.
      operationId: getIndexMetadata
      parameters:
        - name: namespaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexMetadataResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/dictionaries:
    get:
      tags: [dictionaries]
      summary: List all user dictionaries (global + every namespace)
      description: Return all configured Kuromoji user dictionaries.
      operationId: listUserDictionaries
      responses:
        '200':
          description: List
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDictionaryListResponse'
  /api/v1/dictionaries/global:
    get:
      tags: [dictionaries]
      summary: Get the global user dictionary
      description: Return the global user dictionary applied to every namespace.
      operationId: getGlobalUserDictionary
      responses:
        '200':
          description: Dictionary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDictionaryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [dictionaries]
      summary: Create or replace the global user dictionary
      description: Create or replace the global Kuromoji user dictionary.
      operationId: putGlobalUserDictionary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDictionaryUpsertRequest'
      responses:
        '200':
          description: Stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDictionaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [dictionaries]
      summary: Delete the global user dictionary
      description: Delete the global Kuromoji user dictionary if it exists.
      operationId: deleteGlobalUserDictionary
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/dictionaries/namespaces/{namespaceId}:
    parameters:
      - name: namespaceId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [dictionaries]
      summary: Get the namespace-scoped user dictionary
      description: Return the user dictionary configured for one namespace.
      operationId: getNamespaceUserDictionary
      responses:
        '200':
          description: Dictionary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDictionaryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [dictionaries]
      summary: Create or replace a namespace-scoped user dictionary
      description: Create or replace the user dictionary for one namespace.
      operationId: putNamespaceUserDictionary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDictionaryUpsertRequest'
      responses:
        '200':
          description: Stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDictionaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [dictionaries]
      summary: Delete a namespace-scoped user dictionary
      description: Delete the user dictionary configured for one namespace.
      operationId: deleteNamespaceUserDictionary
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    NamespaceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9_-]{0,63}$'
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Conflict (e.g. duplicate id)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
  schemas:
    ApiError:
      type: object
      properties:
        code: { type: string, example: NOT_FOUND }
        message: { type: string }
        details: { type: object }
        timestamp: { type: string, format: date-time }
    NamespaceConfigDto:
      type: object
      properties:
        architecture:
          type: string
          enum: [FULL_TEXT, VECTOR, HYBRID]
        searchStrategy:
          type: string
          enum: [SEQUENTIAL, PARALLEL]
        searchOrder:
          type: string
          enum: [FULL_TEXT_FIRST, VECTOR_FIRST]
        customParams:
          type: object
          additionalProperties: true
    NamespaceCreateRequest:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
        config:
          $ref: '#/components/schemas/NamespaceConfigDto'
    NamespaceUpdateRequest:
      type: object
      properties:
        name: { type: string }
        config:
          $ref: '#/components/schemas/NamespaceConfigDto'
    NamespaceResponse:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        config:
          $ref: '#/components/schemas/NamespaceConfigDto'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    NamespaceListResponse:
      type: object
      properties:
        namespaces:
          type: array
          items:
            $ref: '#/components/schemas/NamespaceResponse'
        total: { type: integer }
    SearchOptions:
      type: object
      properties:
        highlightEnabled: { type: boolean, default: true }
        maxResults: { type: integer, default: 10 }
        offset: { type: integer, default: 0 }
    SearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        namespaceIds:
          type: array
          items: { type: string }
        searchType:
          type: string
          description: |
            Engine selector. Defaults to the namespace's configured
            architecture when omitted.
          enum: [FULL_TEXT, VECTOR, HYBRID]
        options:
          $ref: '#/components/schemas/SearchOptions'
        filters:
          type: object
          additionalProperties: true
    SearchHit:
      type: object
      properties:
        id: { type: string }
        namespaceId: { type: string }
        title: { type: string }
        content: { type: string }
        score: { type: number, format: double }
        highlight:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        metadata:
          type: object
          additionalProperties: true
          description: |
            Free-form per-document metadata returned by the search
            backend. Reserved keys (see docs/architecture.md §5.7):

              * `url`       — origin reference as an RFC 3986 URI with a
                              scheme (`file:///abs/path`, `https://...`,
                              `s3://bucket/key`, ...). UIs may follow this
                              as the link to the source document.
                              Raw filesystem paths without a scheme are
                              rejected.
              * `category`  — facet attribute (string)
              * `lang`      — facet attribute (string)
              * `tags`      — facet attribute (string or string array)

            All other keys pass through unchanged.
    SearchResponse:
      type: object
      properties:
        hits:
          type: array
          items:
            $ref: '#/components/schemas/SearchHit'
        totalHits: { type: integer, format: int64 }
        maxScore: { type: number, format: double }
        aggregations:
          type: object
          additionalProperties: true
        took: { type: integer, format: int64, description: 'milliseconds' }
    DocumentInput:
      type: object
      required: [id, title, content]
      properties:
        id: { type: string }
        title: { type: string }
        content: { type: string }
        metadata:
          type: object
          additionalProperties: true
          description: |
            Per-document attributes. Reserved keys:

              * `url`       — origin reference as an RFC 3986 URI with a
                              scheme (`file:///abs/path`, `https://...`,
                              `s3://bucket/key`, ...). Strongly recommended
                              so search results can link back to the
                              source document and `SubResult.anchorUrl`
                              is generated automatically. Raw filesystem
                              paths without a scheme are not portable;
                              wrap them with `file://` instead.
              * `category` / `lang` / `tags` — facet attributes.
    IndexRequest:
      type: object
      required: [namespaceId, document]
      properties:
        namespaceId: { type: string }
        document:
          $ref: '#/components/schemas/DocumentInput'
    IndexedResponse:
      type: object
      properties:
        id: { type: string }
        namespaceId: { type: string }
        indexedAt: { type: string, format: date-time }
        status: { type: string, example: INDEXED }
    BatchIndexRequest:
      type: object
      required: [namespaceId, documents]
      properties:
        namespaceId: { type: string }
        documents:
          type: array
          items:
            $ref: '#/components/schemas/DocumentInput'
    BatchIndexResponse:
      type: object
      properties:
        total: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        results:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              status: { type: string, example: INDEXED }
              error: { type: string, nullable: true }
    IndexMetadataResponse:
      type: object
      properties:
        namespaceId: { type: string }
        documentCount: { type: integer, format: int64 }
        indexSizeBytes: { type: integer, format: int64 }
        status:
          type: string
          enum: [EMPTY, INDEXING, READY, ERROR]
        lastUpdated: { type: string, format: date-time }
        statistics:
          type: object
          additionalProperties: true
    DictionaryEntry:
      type: object
      required: [surface, segmentation, reading, pos]
      properties:
        surface: { type: string, description: 表層形 }
        segmentation: { type: string, description: 分かち書きされた単語列（空白区切り） }
        reading: { type: string, description: 読み（カタカナ） }
        pos: { type: string, description: 品詞ラベル }
    UserDictionaryUpsertRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        entries:
          type: array
          items:
            $ref: '#/components/schemas/DictionaryEntry'
    UserDictionaryResponse:
      type: object
      properties:
        scope:
          type: string
          description: |
            Scope identifier — `GLOBAL` or `NAMESPACE:<namespaceId>`
        name: { type: string }
        entries:
          type: array
          items:
            $ref: '#/components/schemas/DictionaryEntry'
        updatedAt: { type: string, format: date-time }
    UserDictionaryListResponse:
      type: object
      properties:
        dictionaries:
          type: array
          items:
            $ref: '#/components/schemas/UserDictionaryResponse'
        total: { type: integer }
